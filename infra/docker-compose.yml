services:
  mongo:
    image: mongo:8.3
    container_name: mini-discord-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-rs-init:
    image: mongo:8.3
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: ["bash", "/scripts/init-replica-set.sh"]
    volumes:
      - ./mongo-init:/scripts:ro

  redis:
    image: redis:8
    container_name: mini-discord-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  minio:
    image: minio/minio:latest
    container_name: mini-discord-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ../backend
    container_name: mini-discord-backend
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      MONGODB_URI: mongodb://mongo:27017/mini_discord?replicaSet=rs0
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/mini_discord?replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
      JWT_SECRET: change-this-dev-secret-change-this-dev-secret
      REFRESH_COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8088
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: mini-discord-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.29
    container_name: mini-discord-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo-data:
  redis-data:
  minio-data:
